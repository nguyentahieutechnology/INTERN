{% load i18n %}
{% if lh.trang_thai == 'cho' %}
<form method="post" action="{% url 'le_tan_doi_trang_thai' lh.id 'xacnhan' %}" class="d-inline">{% csrf_token %}
    <button class="btn btn-sm btn-outline-success"><i class="bi bi-check-lg"></i> {% trans "Xác nhận" %}</button>
</form>
<form method="post" action="{% url 'le_tan_doi_trang_thai' lh.id 'huy' %}" class="d-inline">{% csrf_token %}
    <button class="btn btn-sm btn-outline-danger">{% trans "Hủy" %}</button>
</form>
{% elif lh.trang_thai == 'xacnhan' %}
<form method="post" action="{% url 'le_tan_da_den' lh.id %}" class="d-inline">{% csrf_token %}
    {% if lh.la_tai_kham %}
    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-in-right"></i> {% trans "Đã đến" %}</button>
    {% else %}
    <button class="btn btn-sm btn-outline-primary"><i class="bi bi-box-arrow-in-right"></i> {% trans "Đã tới" %}</button>
    {% endif %}
</form>
<form method="post" action="{% url 'le_tan_doi_trang_thai' lh.id 'huy' %}" class="d-inline">{% csrf_token %}
    <button class="btn btn-sm btn-outline-danger">{% trans "Hủy" %}</button>
</form>
{% else %}
<span class="text-muted small">—</span>
{% endif %}
